name: Deploy Portfolio to Oracle Cloud

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.2.20'

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build project
        run: bun run build

      - name: Copy static site to Oracle
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.ORACLE_IP_NORBERTFILA }}
          username: ${{ secrets.ORACLE_USER_NORBERTFILA }}
          key: ${{ secrets.ORACLE_SSH_KEY_NORBERTFILA }}
          source: 'dist/*'
          target: '/var/www/norbertfila.com'
          strip_components: 1

      - name: Copy ebook API files to Oracle
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.ORACLE_IP_NORBERTFILA }}
          username: ${{ secrets.ORACLE_USER_NORBERTFILA }}
          key: ${{ secrets.ORACLE_SSH_KEY_NORBERTFILA }}
          source: 'server/ebook-subscribe/*.mjs'
          target: '/tmp/nf-api-upload'
          strip_components: 2

      - name: Configure and restart ebook API service
        uses: appleboy/ssh-action@master
        env:
          MAILERLITE_API_KEY: ${{ secrets.MAILERLITE_API_KEY }}
          MAILERLITE_GROUP_ID: ${{ secrets.MAILERLITE_GROUP_ID }}
        with:
          host: ${{ secrets.ORACLE_IP_NORBERTFILA }}
          username: ${{ secrets.ORACLE_USER_NORBERTFILA }}
          key: ${{ secrets.ORACLE_SSH_KEY_NORBERTFILA }}
          envs: MAILERLITE_API_KEY,MAILERLITE_GROUP_ID
          script: |
            set -e

            if ! command -v node >/dev/null 2>&1; then
              curl -fsSL https://deb.nodesource.com/setup_20.x | sudo -E bash -
              sudo apt-get install -y nodejs
            fi

            node -v
            npm -v

            if [ -z "$MAILERLITE_API_KEY" ]; then
              echo "MAILERLITE_API_KEY secret is missing"
              exit 1
            fi

            if [ -z "$MAILERLITE_GROUP_ID" ]; then
              echo "MAILERLITE_GROUP_ID secret is missing"
              exit 1
            fi

            sudo mkdir -p /opt/nf-api
            sudo chown -R $USER:$USER /opt/nf-api

            cp /tmp/nf-api-upload/*.mjs /opt/nf-api/

            cat > /opt/nf-api/.env <<EOF
            MAILERLITE_API_KEY=$MAILERLITE_API_KEY
            MAILERLITE_GROUP_ID=$MAILERLITE_GROUP_ID
            ALLOWED_ORIGIN=https://norbertfila.com
            PORT=8787
            EOF

            cat > /tmp/nf-ebook-api.service <<'EOF'
            [Unit]
            Description=NF Ebook Subscribe API
            After=network.target

            [Service]
            User=ubuntu
            WorkingDirectory=/opt/nf-api
            EnvironmentFile=/opt/nf-api/.env
            ExecStart=/usr/bin/env node /opt/nf-api/server.mjs
            Restart=always
            RestartSec=3

            [Install]
            WantedBy=multi-user.target
            EOF

            sudo mv /tmp/nf-ebook-api.service /etc/systemd/system/nf-ebook-api.service
            sudo chmod 644 /etc/systemd/system/nf-ebook-api.service

            sudo systemctl daemon-reload
            sudo systemctl enable nf-ebook-api
            sudo systemctl restart nf-ebook-api
            sudo systemctl is-active --quiet nf-ebook-api

            NGINX_SITE=/etc/nginx/sites-available/norbertfila.com
            if ! sudo grep -q "location /api/ebook-subscribe" "$NGINX_SITE"; then
              sudo python3 -c "from pathlib import Path; p=Path('/etc/nginx/sites-available/norbertfila.com'); c=p.read_text(); b='    location /api/ebook-subscribe {\n        proxy_pass http://127.0.0.1:8787/api/ebook-subscribe;\n        proxy_http_version 1.1;\n        proxy_set_header Host $host;\n        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;\n        proxy_set_header X-Forwarded-Proto $scheme;\n    }\n\n'; a='    location / {'; p.write_text(c.replace(a, b + a, 1)) if (b not in c and a in c) else None"

              sudo nginx -t
              sudo systemctl reload nginx
            fi

            rm -rf /tmp/nf-api-upload

      - name: Verify ebook API endpoint
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.ORACLE_IP_NORBERTFILA }}
          username: ${{ secrets.ORACLE_USER_NORBERTFILA }}
          key: ${{ secrets.ORACLE_SSH_KEY_NORBERTFILA }}
          script: |
            set -e
            status_local=$(curl -s -o /dev/null -w "%{http_code}" http://127.0.0.1:8787/api/ebook-subscribe)
            if [ "$status_local" != "405" ]; then
              echo "Unexpected local API status code: $status_local"
              exit 1
            fi

            status_public=$(curl -s -o /dev/null -w "%{http_code}" https://norbertfila.com/api/ebook-subscribe)
            if [ "$status_public" = "405" ]; then
              exit 0
            fi
            echo "Unexpected public API status code: $status_public"
            exit 1

      - name: Cleanup on failure
        if: failure()
        run: echo "Deployment failed - Check the logs above."
