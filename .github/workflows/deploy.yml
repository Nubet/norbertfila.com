name: Deploy Portfolio to Oracle Cloud

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.2.20'

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build project
        run: bun run build

      - name: Verify Next standalone artifacts
        run: |
          test -f .next/standalone/server.js
          test -d .next/static
          test -d public

      - name: Copy Next standalone server to Oracle
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.ORACLE_IP_NORBERTFILA }}
          username: ${{ secrets.ORACLE_USER_NORBERTFILA }}
          key: ${{ secrets.ORACLE_SSH_KEY_NORBERTFILA }}
          source: '.next/standalone/*'
          target: '/tmp/nf-next-upload/standalone'
          strip_components: 2

      - name: Copy Next standalone hidden .next files to Oracle
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.ORACLE_IP_NORBERTFILA }}
          username: ${{ secrets.ORACLE_USER_NORBERTFILA }}
          key: ${{ secrets.ORACLE_SSH_KEY_NORBERTFILA }}
          source: '.next/standalone/.next/*'
          target: '/tmp/nf-next-upload/standalone/.next'
          strip_components: 3

      - name: Copy Next static assets to Oracle
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.ORACLE_IP_NORBERTFILA }}
          username: ${{ secrets.ORACLE_USER_NORBERTFILA }}
          key: ${{ secrets.ORACLE_SSH_KEY_NORBERTFILA }}
          source: '.next/static/*'
          target: '/tmp/nf-next-upload/static'
          strip_components: 2

      - name: Copy public assets to Oracle
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.ORACLE_IP_NORBERTFILA }}
          username: ${{ secrets.ORACLE_USER_NORBERTFILA }}
          key: ${{ secrets.ORACLE_SSH_KEY_NORBERTFILA }}
          source: 'public/*'
          target: '/tmp/nf-next-upload/public'
          strip_components: 1

      - name: Copy ebook API files to Oracle
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.ORACLE_IP_NORBERTFILA }}
          username: ${{ secrets.ORACLE_USER_NORBERTFILA }}
          key: ${{ secrets.ORACLE_SSH_KEY_NORBERTFILA }}
          source: 'server/ebook-subscribe/*.mjs'
          target: '/tmp/nf-api-upload'
          strip_components: 2

      - name: Configure and restart Next and ebook services
        uses: appleboy/ssh-action@master
        env:
          MAILERLITE_API_KEY: ${{ secrets.MAILERLITE_API_KEY }}
          MAILERLITE_GROUP_ID: ${{ secrets.MAILERLITE_GROUP_ID }}
          SECURITY_CSP_MODE: ${{ secrets.SECURITY_CSP_MODE }}
        with:
          host: ${{ secrets.ORACLE_IP_NORBERTFILA }}
          username: ${{ secrets.ORACLE_USER_NORBERTFILA }}
          key: ${{ secrets.ORACLE_SSH_KEY_NORBERTFILA }}
          envs: MAILERLITE_API_KEY,MAILERLITE_GROUP_ID,SECURITY_CSP_MODE
          script: |
            set -e

            if ! command -v node >/dev/null 2>&1; then
              curl -fsSL https://deb.nodesource.com/setup_20.x | sudo -E bash -
              sudo apt-get install -y nodejs
            fi

            node -v
            npm -v

            if [ -z "$MAILERLITE_API_KEY" ]; then
              echo "MAILERLITE_API_KEY secret is missing"
              exit 1
            fi

            if [ -z "$MAILERLITE_GROUP_ID" ]; then
              echo "MAILERLITE_GROUP_ID secret is missing"
              exit 1
            fi

            sudo mkdir -p /opt/nf-portfolio
            sudo chown -R $USER:$USER /opt/nf-portfolio

            rm -rf /opt/nf-portfolio/*
            cp -R /tmp/nf-next-upload/standalone/. /opt/nf-portfolio/
            mkdir -p /opt/nf-portfolio/.next
            cp -R /tmp/nf-next-upload/static /opt/nf-portfolio/.next/
            cp -R /tmp/nf-next-upload/public /opt/nf-portfolio/

            if [ ! -f /opt/nf-portfolio/.next/BUILD_ID ]; then
              echo "Missing /opt/nf-portfolio/.next/BUILD_ID after copy"
              ls -la /opt/nf-portfolio || true
              ls -la /opt/nf-portfolio/.next || true
              exit 1
            fi

            cat > /tmp/nf-portfolio.service <<'EOF'
            [Unit]
            Description=NF Portfolio Next.js App
            After=network.target

            [Service]
            User=ubuntu
            WorkingDirectory=/opt/nf-portfolio
            Environment=NODE_ENV=production
            Environment=PORT=3000
            ExecStart=/usr/bin/env node /opt/nf-portfolio/server.js
            Restart=always
            RestartSec=3

            [Install]
            WantedBy=multi-user.target
            EOF

            sudo mv /tmp/nf-portfolio.service /etc/systemd/system/nf-portfolio.service
            sudo chmod 644 /etc/systemd/system/nf-portfolio.service
            sudo systemctl daemon-reload
            sudo systemctl enable nf-portfolio
            sudo systemctl restart nf-portfolio
            sudo systemctl is-active --quiet nf-portfolio

            sudo mkdir -p /opt/nf-api
            sudo chown -R $USER:$USER /opt/nf-api

            cp /tmp/nf-api-upload/*.mjs /opt/nf-api/

            cat > /opt/nf-api/.env <<EOF
            MAILERLITE_API_KEY=$MAILERLITE_API_KEY
            MAILERLITE_GROUP_ID=$MAILERLITE_GROUP_ID
            ALLOWED_ORIGIN=https://norbertfila.com
            PORT=8787
            EOF

            cat > /tmp/nf-ebook-api.service <<'EOF'
            [Unit]
            Description=NF Ebook Subscribe API
            After=network.target

            [Service]
            User=ubuntu
            WorkingDirectory=/opt/nf-api
            EnvironmentFile=/opt/nf-api/.env
            ExecStart=/usr/bin/env node /opt/nf-api/server.mjs
            Restart=always
            RestartSec=3

            [Install]
            WantedBy=multi-user.target
            EOF

            sudo mv /tmp/nf-ebook-api.service /etc/systemd/system/nf-ebook-api.service
            sudo chmod 644 /etc/systemd/system/nf-ebook-api.service

            sudo systemctl daemon-reload
            sudo systemctl enable nf-ebook-api
            sudo systemctl restart nf-ebook-api
            sudo systemctl is-active --quiet nf-ebook-api

            CSP_MODE=${SECURITY_CSP_MODE:-enforce}
            if [ "$CSP_MODE" != "report-only" ] && [ "$CSP_MODE" != "enforce" ]; then
              echo "Invalid SECURITY_CSP_MODE: $CSP_MODE (allowed: report-only, enforce)"
              exit 1
            fi

            export CSP_MODE
            sudo -E python3 <<'PY'
            import os
            import re
            from pathlib import Path

            p = Path('/etc/nginx/sites-available/norbertfila.com')
            c = p.read_text()

            c = re.sub(r"\n\s*# BEGIN nf-next-app\n(?:\s+.*\n)*?\s*# END nf-next-app\n", "\n", c)
            c = re.sub(r"\n\s*# BEGIN nf-ebook-api\n(?:\s+.*\n)*?\s*# END nf-ebook-api\n", "\n", c)
            c = re.sub(r"\n\s*# BEGIN nf-security-headers\n(?:\s+.*\n)*?\s*# END nf-security-headers\n", "\n", c)
            c = re.sub(r"\n\s*location /api/ebook-subscribe \{\n(?:\s+.*\n)*?\s*\}\n", "\n", c)
            c = re.sub(r"\n\s*location / \{\n(?:\s+.*\n)*?\s*\}\n", "\n", c, count=1)

            csp_value = (
                "default-src 'self'; "
                "base-uri 'self'; "
                "object-src 'none'; "
                "frame-ancestors 'none'; "
                "img-src 'self' data: https://cdn.jsdelivr.net; "
                "font-src 'self' https://fonts.gstatic.com data:; "
                "style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; "
                "script-src 'self' 'unsafe-inline'; "
                "connect-src 'self'; "
                "form-action 'self'; "
                "upgrade-insecure-requests"
            )

            csp_header_name = 'Content-Security-Policy' if os.environ.get('CSP_MODE') == 'enforce' else 'Content-Security-Policy-Report-Only'

            security_block = (
                "    # BEGIN nf-security-headers\n"
                "    add_header Strict-Transport-Security \"max-age=31536000; includeSubDomains\" always;\n"
                "    add_header X-Frame-Options \"SAMEORIGIN\" always;\n"
                "    add_header X-Content-Type-Options \"nosniff\" always;\n"
                "    add_header Referrer-Policy \"strict-origin-when-cross-origin\" always;\n"
                "    add_header Permissions-Policy \"accelerometer=(), ambient-light-sensor=(), autoplay=(), battery=(), camera=(), display-capture=(), document-domain=(), encrypted-media=(), execution-while-not-rendered=(), execution-while-out-of-viewport=(), fullscreen=(self), gamepad=(), geolocation=(), gyroscope=(), hid=(), magnetometer=(), microphone=(), midi=(), payment=(), picture-in-picture=(), publickey-credentials-get=(), screen-wake-lock=(), serial=(), sync-xhr=(), usb=(), web-share=(), xr-spatial-tracking=()\" always;\n"
                "    add_header Cross-Origin-Resource-Policy \"same-origin\" always;\n"
                f"    add_header {csp_header_name} \"{csp_value}\" always;\n"
                "    # END nf-security-headers\n\n"
            )

            api_block = (
                "    # BEGIN nf-ebook-api\n"
                "    location /api/ebook-subscribe {\n"
                "        proxy_pass http://127.0.0.1:8787/api/ebook-subscribe;\n"
                "        proxy_http_version 1.1;\n"
                "        proxy_set_header Host $host;\n"
                "        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;\n"
                "        proxy_set_header X-Forwarded-Proto $scheme;\n"
                "    }\n"
                "    # END nf-ebook-api\n\n"
            )

            next_block = (
                "    # BEGIN nf-next-app\n"
                "    location / {\n"
                "        proxy_pass http://127.0.0.1:3000;\n"
                "        proxy_http_version 1.1;\n"
                "        proxy_set_header Host $host;\n"
                "        proxy_set_header X-Real-IP $remote_addr;\n"
                "        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;\n"
                "        proxy_set_header X-Forwarded-Proto $scheme;\n"
                "        proxy_set_header Upgrade $http_upgrade;\n"
                "        proxy_set_header Connection \"upgrade\";\n"
                "    }\n"
                "    # END nf-next-app\n\n"
            )

            server_open = c.find('server {')
            if server_open == -1:
                raise SystemExit('Cannot find nginx server block')

            insert_at = c.find('\n}', server_open)
            if insert_at == -1:
                raise SystemExit('Cannot find nginx server block end')

            blocks = security_block + api_block + next_block
            p.write_text(c[:insert_at] + '\n' + blocks + c[insert_at:])
            PY

            sudo nginx -t
            sudo systemctl reload nginx

            rm -rf /tmp/nf-api-upload
            rm -rf /tmp/nf-next-upload

      - name: Verify ebook API endpoint
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.ORACLE_IP_NORBERTFILA }}
          username: ${{ secrets.ORACLE_USER_NORBERTFILA }}
          key: ${{ secrets.ORACLE_SSH_KEY_NORBERTFILA }}
          script: |
            set -e

            status_local=$(curl -s -o /dev/null -w "%{http_code}" http://127.0.0.1:8787/api/ebook-subscribe)
            if [ "$status_local" != "405" ]; then
              echo "Unexpected local API status code: $status_local"
              echo "---- debug: local GET headers ----"
              curl -sS -D - -o /dev/null http://127.0.0.1:8787/api/ebook-subscribe || true
              exit 1
            fi

            status_public=$(curl -s -o /dev/null -w "%{http_code}" -X POST "https://norbertfila.com/api/ebook-subscribe" -H "Content-Type: application/json" -d '{"email":"invalid-email"}')
            case "$status_public" in
              200|400|429|500|502)
                exit 0
                ;;
              *)
                echo "Unexpected public API status code: $status_public"
                echo "---- debug: systemd status ----"
                sudo systemctl --no-pager --full status nf-ebook-api || true
                echo "---- debug: last service logs ----"
                sudo journalctl -u nf-ebook-api -n 120 --no-pager || true
                echo "---- debug: nginx security/header snippet ----"
                sudo sed -n '/BEGIN nf-security-headers/,/END nf-security-headers/p' /etc/nginx/sites-available/norbertfila.com || true
                echo "---- debug: nginx location snippet ----"
                sudo sed -n '/BEGIN nf-ebook-api/,/END nf-ebook-api/p' /etc/nginx/sites-available/norbertfila.com || true
                echo "---- debug: local POST (invalid payload) ----"
                curl -sS -i -X POST "http://127.0.0.1:8787/api/ebook-subscribe" -H "Content-Type: application/json" -d '{"email":"invalid-email"}' || true
                echo "---- debug: public POST (invalid payload) ----"
                curl -sS -i -X POST "https://norbertfila.com/api/ebook-subscribe" -H "Content-Type: application/json" -d '{"email":"invalid-email"}' || true
                echo "---- debug: public GET headers ----"
                curl -sS -D - -o /dev/null "https://norbertfila.com/api/ebook-subscribe" || true
                exit 1
                ;;
            esac

      - name: Verify Next.js app endpoint
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.ORACLE_IP_NORBERTFILA }}
          username: ${{ secrets.ORACLE_USER_NORBERTFILA }}
          key: ${{ secrets.ORACLE_SSH_KEY_NORBERTFILA }}
          script: |
            set -e

            if ! sudo systemctl is-active --quiet nf-portfolio; then
              echo "nf-portfolio service is not active"
              echo "---- debug: nf-portfolio status ----"
              sudo systemctl --no-pager --full status nf-portfolio || true
              echo "---- debug: nf-portfolio logs ----"
              sudo journalctl -u nf-portfolio -n 120 --no-pager || true
              exit 1
            fi

            status_local=$(curl -s -o /dev/null -w "%{http_code}" http://127.0.0.1:3000/)
            if [ "$status_local" != "200" ]; then
              echo "Unexpected local Next app status code: $status_local"
              echo "---- debug: nf-portfolio status ----"
              sudo systemctl --no-pager --full status nf-portfolio || true
              echo "---- debug: nf-portfolio logs ----"
              sudo journalctl -u nf-portfolio -n 120 --no-pager || true
              echo "---- debug: local headers ----"
              curl -sS -D - -o /dev/null http://127.0.0.1:3000/ || true
              exit 1
            fi

            status_public=$(curl -s -o /dev/null -w "%{http_code}" https://norbertfila.com/)
            if [ "$status_public" != "200" ]; then
              echo "Unexpected public Next app status code: $status_public"
              echo "---- debug: public headers ----"
              curl -sS -D - -o /dev/null https://norbertfila.com/ || true
              exit 1
            fi

            status_robots=$(curl -s -o /dev/null -w "%{http_code}" https://norbertfila.com/robots.txt)
            if [ "$status_robots" != "200" ]; then
              echo "Unexpected robots.txt status code: $status_robots"
              curl -sS -D - -o /dev/null https://norbertfila.com/robots.txt || true
              exit 1
            fi

            status_sitemap=$(curl -s -o /dev/null -w "%{http_code}" https://norbertfila.com/sitemap.xml)
            if [ "$status_sitemap" != "200" ]; then
              echo "Unexpected sitemap.xml status code: $status_sitemap"
              curl -sS -D - -o /dev/null https://norbertfila.com/sitemap.xml || true
              exit 1
            fi

      - name: Cleanup on failure
        if: failure()
        run: echo "Deployment failed - Check the logs above."
