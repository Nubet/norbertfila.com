name: Deploy Portfolio to Oracle Cloud

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.2.20'

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build project
        run: bun run build

      - name: Copy files to Oracle Server
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.ORACLE_IP_NORBERTFILA }}
          username: ${{ secrets.ORACLE_USER_NORBERTFILA }}
          key: ${{ secrets.ORACLE_SSH_KEY_NORBERTFILA }}
          source: 'dist/*'
          target: '/var/www/norbertfila.com'
          strip_components: 1

      - name: Cleanup on failure
        if: failure()
        run: echo "Deployment failed - Check the logs above."
